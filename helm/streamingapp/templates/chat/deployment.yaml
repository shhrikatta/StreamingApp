apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app.kubernetes.io/name: chat
spec:
  replicas: {{ .Values.chat.replicaCount }}
  selector:
    matchLabels:
      {{- include "streamingapp.selectorLabels" (dict "component" "chat" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "streamingapp.selectorLabels" (dict "component" "chat" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: chat
          image: "{{ .Values.chat.image.repository }}:{{ .Values.chat.image.tag }}"
          imagePullPolicy: {{ .Values.chat.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.chat.port }}
          env:
            - name: PORT
              value: {{ .Values.chat.port | quote }}
            - name: NODE_ENV
              value: production
          envFrom:
            - configMapRef:
                name: streamingapp-config
            - secretRef:
                name: streamingapp-secrets
          resources:
            {{- toYaml .Values.chat.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.chat.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.chat.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
