apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app.kubernetes.io/name: admin
spec:
  type: ClusterIP
  selector:
    {{- include "streamingapp.selectorLabels" (dict "component" "admin" "Release" .Release) | nindent 4 }}
  ports:
    - port: {{ .Values.admin.port }}
      targetPort: {{ .Values.admin.port }}
      protocol: TCP
      name: http
