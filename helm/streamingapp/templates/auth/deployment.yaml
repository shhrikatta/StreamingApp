apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app.kubernetes.io/name: auth
spec:
  replicas: {{ .Values.auth.replicaCount }}
  selector:
    matchLabels:
      {{- include "streamingapp.selectorLabels" (dict "component" "auth" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "streamingapp.selectorLabels" (dict "component" "auth" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: auth
          image: "{{ .Values.auth.image.repository }}:{{ .Values.auth.image.tag }}"
          imagePullPolicy: {{ .Values.auth.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.auth.port }}
          env:
            - name: PORT
              value: {{ .Values.auth.port | quote }}
            - name: NODE_ENV
              value: production
          envFrom:
            - configMapRef:
                name: streamingapp-config
            - secretRef:
                name: streamingapp-secrets
          resources:
            {{- toYaml .Values.auth.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
